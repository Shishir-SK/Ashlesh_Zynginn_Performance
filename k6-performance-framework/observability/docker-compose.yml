version: '3.8'

services:
  # InfluxDB - Time series database for k6 metrics
  influxdb:
    image: influxdb:2.7
    container_name: k6-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=k6-org
      - DOCKER_INFLUXDB_INIT_BUCKET=k6-bucket
      - DOCKER_INFLUXDB_INIT_RETENTION=7d
      - INFLUXD_HTTP_BIND_ADDRESS=:8086
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2
    networks:
      - k6-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Grafana - Visualization dashboard
  grafana:
    image: grafana/grafana:10.2.3
    container_name: k6-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-storage:/var/lib/grafana
    networks:
      - k6-network
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # k6 - Load testing tool (optional - can also run locally)
  k6:
    image: grafana/k6:latest
    container_name: k6-runner
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6-bucket
      - K6_INFLUXDB_ORGANIZATION=k6-org
      - K6_INFLUXDB_TOKEN=adminpassword
      - K6_INFLUXDB_PUSH_INTERVAL=1s
      - USER_EMAIL=${USER_EMAIL}
      - USER_PASSWORD=${USER_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENV=${ENV:-staging}
    volumes:
      - ../:/scripts
    networks:
      - k6-network
    depends_on:
      influxdb:
        condition: service_healthy
    profiles:
      - k6  # Only start when explicitly requested

networks:
  k6-network:
    driver: bridge

volumes:
  grafana-storage:
